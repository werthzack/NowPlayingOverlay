<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { margin: 0; background: transparent; font-family: Arial, sans-serif; }
        #card {
            position: fixed; bottom: 20px; left: 20px;
            background: rgba(20,20,20,0.85); border-radius: 12px;
            padding: 16px; display: flex; align-items: center; gap: 14px;
            width: 360px; opacity: 0; transition: opacity 0.5s ease;
        }
        #card.visible { opacity: 1; }
        #thumb { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; background: #333; flex-shrink: 0; }
        #title { color: #fff; font-size: 15px; font-weight: bold; margin: 0 0 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #artist { color: #ccc; font-size: 12px; margin: 0 0 10px; }
        #barRow { display: flex; align-items: center; gap: 8px; }
        #elapsed, #remaining { color: #fff; font-size: 11px; font-weight: bold; min-width: 30px; }
        #barTrack { flex: 1; height: 3px; background: rgba(255,255,255,0.25); border-radius: 2px; overflow: hidden; }
        #barFill { width: 0%; height: 100%; background: #fff; }
    </style>
</head>
<body>
<div id="card">
    <img id="thumb" src="/thumbnail.jpg" alt=""/>
    <div style="flex:1; min-width:0;">
        <p id="title"></p>
        <p id="artist"></p>
        <div id="barRow">
            <span id="elapsed">0:00</span>
            <div id="barTrack"><div id="barFill"></div></div>
            <span id="remaining">-0:00</span>
        </div>
    </div>
</div>
<script>
    function fmt(sec) {
        sec = Math.max(0, Math.floor(sec));
        const m = Math.floor(sec / 60), s = sec % 60;
        return m + ":" + String(s).padStart(2, "0");
    }

    let basePosition = 0, baseTimestamp = 0, duration = 0, lastTitle = "", lastServerPosition = null;
    
    let failCount = 0;
    async function poll() {
        try {
            const res = await fetch('/nowplaying.json');
            const data = await res.json();
            const card = document.getElementById('card');

            if (data.title) {
                if (data.title !== lastTitle) {
                    document.getElementById('title').textContent = data.title;
                    document.getElementById('artist').textContent = data.artist || "";
                    document.getElementById('thumb').src = '/thumbnail.jpg?t=' + Date.now();
                    lastTitle = data.title;
                    lastServerPosition = null; // force resync on track change
                }

                duration = data.duration;

                // only resync if the server's reported position actually moved
                if (data.position !== lastServerPosition) {
                    basePosition = data.position;
                    baseTimestamp = Date.now();
                    lastServerPosition = data.position;
                }

                card.classList.add('visible');
            } else {
                card.classList.remove('visible');
                lastTitle = "";
                duration = 0;
                lastServerPosition = null;
            }
            failCount = 0;
        } catch (e) {
            failCount++;
            if (failCount > 3){
                const card = document.getElementById('card');
                card.classList.remove('visible');
            }
        }
        
        setTimeout(poll, 1000);
    }

    function tick() {
        if (duration > 0) {
            const elapsed = Math.min(duration, basePosition + (Date.now() - baseTimestamp) / 1000);
            document.getElementById('elapsed').textContent = fmt(elapsed);
            document.getElementById('remaining').textContent = "-" + fmt(duration - elapsed);
            document.getElementById('barFill').style.width = (elapsed / duration * 100) + "%";
        }
        requestAnimationFrame(tick);
    }

    poll();
    tick();
</script>
</body>
</html>
